version: "3.9"

services:

  api:
    build: .
    container_name: ai-job-scout-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env

  dashboard:
    build: .
    container_name: ai-job-scout-dashboard
    command: streamlit run frontend/dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - api